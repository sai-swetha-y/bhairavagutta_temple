<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Temple Admin Dashboard</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Premium Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="admin.css">
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" class="login-overlay">
  <div class="login-box">
    <h4>🔐 Admin Login</h4>
    <input id="adminPassword" type="password" class="form-control mb-2" placeholder="Enter Password">
    <button id="loginBtn" class="btn btn-gold w-100">Login</button>
  </div>
</div>

<div class="container py-4" style="max-width: 1100px;">

  <!-- HEADER -->
<div class="top-bar">

  <div class="top-left">
    <span class="logo">📊</span>
    <h2>Bhairavagutta Dashboard</h2>
  </div>

  <div class="top-right">
    <button id="exportBtn" class="btn btn-outline-warning btn-sm">
      Export ⬇️
    </button>

    <button id="logoutBtn" class="btn btn-outline-danger btn-sm">
      Logout
    </button>
  </div>

</div>

  <!-- KPI -->
  <div class="row g-4 mb-4">
    <div class="col-md-4">
      <div class="kpi-card">
        <p>Total Bookings</p>
        <h2 id="total">0</h2>
      </div>
    </div>

    <div class="col-md-4">
      <div class="kpi-card">
        <p>Total Revenue</p>
        <h2>₹<span id="revenue">0</span></h2>
      </div>
    </div>

    <div class="col-md-4">
      <div class="kpi-card">
        <p>Today Bookings</p>
        <h2 id="today">0</h2>
      </div>
    </div>
<div class="status-summary">
  <span class="status verified">✔ Verified: <b id="verifiedCount">0</b></span>
  <span class="status pending">⏳ Pending: <b id="pendingCount">0</b></span>
</div>
  </div>
  <!-- CHART -->
  <div class="glass-card mb-4">
    <h5>Revenue Overview</h5>
    <canvas id="revenueChart"></canvas>
  </div>

  <!-- FILTER -->
 <div class="glass-card mb-4 p-3">

  <div class="row g-2 align-items-center">

    <!-- SEARCH -->
    <div class="col-md-3">
      <input id="searchInput" class="form-control form-control-sm"
        placeholder="Search">
    </div>

    <!-- DAY -->
    <div class="col-md-2">
      <select id="dayFilter" class="form-control form-control-sm">
        <option value="">All Days</option>
        <option>Normal</option>
        <option>Amavasya</option>
        <option>Trayodashi</option>
      </select>
    </div>

    <!-- STATUS -->
    <div class="col-md-2">
      <select id="statusFilter" class="form-control form-control-sm">
        <option value="">Status</option>
        <option value="VERIFIED">Verified</option>
        <option value="PAID">Pending</option>
      </select>
    </div>

    <!-- FROM DATE -->
    <div class="col-md-2">
      <input type="date" id="fromDate" class="form-control form-control-sm">
    </div>

    <!-- TO DATE -->
    <div class="col-md-2">
      <input type="date" id="toDate" class="form-control form-control-sm">
    </div>

    <!-- BUTTON -->
    <div class="col-md-1">
      <button id="applyFilter" class="btn btn-gold btn-sm w-100">
        Apply
      </button>
    </div>

  </div>

</div>
<div id="matchCount" style="color:gold; margin-bottom:10px;">Results: 0</div>
  <!-- TABLE -->
  <div class="main-table">
  <table>

    <thead>
      <tr>
        <th class="sticky-col">Name</th>
        <th class="sticky-col second">Phone</th>
        <th>Gothram</th>
        <th>Seva</th>
        <th>Amount</th>
        <th>UTR</th>
        <th>Day</th>
        <th>Status</th>
        <th>Date</th>
        <th>Action</th>
      </tr>
    </thead>

    <tbody id="tableBody"></tbody>

  </table>
</div>

</div>

<!-- POPUP -->
<div id="devoteePopup" class="popup-overlay" style="display:none;">
  <div class="popup-card">

    <div class="popup-header">
      <h3>🧾 Devotee Details</h3>
      <span class="close-btn" onclick="closePopup()">✕</span>
    </div>

    <div id="popupContent" class="popup-body"></div>

    <div class="popup-footer">
      <button class="btn btn-gold" onclick="closePopup()">Close</button>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="admin.js"></script>

</body>
</html>
